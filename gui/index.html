<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMCL</title>
<style>
  :root {
    --bg-deep: #141210;
    --bg: #1c1916;
    --card: #242019;
    --card-raised: #2c2720;
    --border: #3d362c;
    --border-light: #4a4238;
    --text: #ece4d8;
    --text-muted: #a89f92;
    --text-dim: #7a7268;
    --accent: #d4a853;
    --accent-bright: #e8c06a;
    --accent-dim: rgba(212, 168, 83, 0.12);
    --accent-glow: rgba(212, 168, 83, 0.25);
    --success: #7cab5a;
    --success-dim: rgba(124, 171, 90, 0.12);
    --danger: #c75c5c;
    --danger-dim: rgba(199, 92, 92, 0.12);
    --radius: 10px;
    --radius-lg: 14px;
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: var(--bg-deep);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(212, 168, 83, 0.08), transparent),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(124, 171, 90, 0.05), transparent);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 28px 20px;
  }

  .app {
    width: 100%;
    max-width: 640px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  /* ---- Header ---- */
  .header {
    padding: 28px 32px 22px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--card-raised) 0%, var(--card) 100%);
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: linear-gradient(145deg, #5a8a3c 0%, #3d6b28 100%);
    border: 2px solid #6b9e45;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .header-text h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .header-text h1 span {
    color: var(--accent-bright);
  }
  .sub {
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 2px;
  }

  .body { padding: 28px 32px 32px; }

  .step { display: none; animation: fadeIn 0.25s ease; }
  .step.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .step-title .hint-inline {
    display: block;
    font-weight: 400;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ---- Loader cards ---- */
  .cards { display: flex; gap: 10px; flex-wrap: wrap; }
  .card {
    flex: 1;
    min-width: 130px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 14px;
    cursor: pointer;
    text-align: center;
    background: var(--bg);
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
  }
  .card:hover {
    border-color: var(--border-light);
    background: var(--card-raised);
    transform: translateY(-1px);
  }
  .card.selected {
    border-color: var(--accent);
    background: var(--accent-dim);
    box-shadow: 0 0 0 1px var(--accent-glow), 0 4px 16px rgba(0, 0, 0, 0.2);
  }
  .card .icon { font-size: 28px; margin-bottom: 10px; line-height: 1; }
  .card .label { font-weight: 600; font-size: 14px; color: var(--text); }
  .card .hint { font-size: 11px; color: var(--text-dim); margin-top: 6px; line-height: 1.4; }

  /* ---- Forms ---- */
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 7px;
    letter-spacing: 0.02em;
    text-transform: none;
  }
  .form-group input,
  .form-group select {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-group input::placeholder { color: var(--text-dim); }
  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  .form-row { display: flex; gap: 8px; }
  .form-row input { flex: 1; }

  #dir-preview {
    font-size: 12px;
    color: var(--success);
    margin-top: 6px;
    min-height: 18px;
    font-family: Consolas, "JetBrains Mono", monospace;
    opacity: 0.9;
  }

  details.advanced {
    margin-bottom: 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    background: var(--bg);
  }
  details.advanced summary {
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
    list-style: none;
  }
  details.advanced summary::-webkit-details-marker { display: none; }
  details.advanced summary::before {
    content: "▸ ";
    color: var(--accent);
    font-size: 11px;
  }
  details.advanced[open] summary::before { content: "▾ "; }
  details.advanced summary:hover { color: var(--accent-bright); }
  details.advanced .form-group { margin-top: 14px; margin-bottom: 0; }
  details.advanced .form-group + .form-group { margin-top: 14px; }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 14px;
    cursor: pointer;
  }
  .checkbox-row input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* ---- Buttons ---- */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 11px 22px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.15s, opacity 0.15s;
  }
  .btn:hover:not(:disabled) { transform: translateY(-1px); }
  .btn:active:not(:disabled) { transform: translateY(0); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-primary {
    background: linear-gradient(180deg, var(--accent-bright) 0%, var(--accent) 100%);
    color: #1a1408;
    box-shadow: 0 2px 8px rgba(212, 168, 83, 0.3);
  }
  .btn-primary:hover:not(:disabled) {
    box-shadow: 0 4px 14px rgba(212, 168, 83, 0.4);
  }
  .btn-secondary {
    background: var(--card-raised);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover:not(:disabled) {
    border-color: var(--border-light);
    background: var(--bg);
  }
  .btn-sm { padding: 9px 16px; font-size: 13px; }
  .btn-group { display: flex; gap: 10px; margin-top: 26px; }

  /* ---- Log ---- */
  .log {
    background: var(--bg-deep);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    height: 240px;
    overflow-y: auto;
    font-family: Consolas, "JetBrains Mono", "Cascadia Mono", monospace;
    font-size: 12px;
    line-height: 1.75;
    color: var(--text-muted);
  }
  .log::-webkit-scrollbar { width: 6px; }
  .log::-webkit-scrollbar-track { background: transparent; }
  .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .log-err { color: var(--danger); }
  .log-ok { color: var(--success); }

  /* ---- Phase stepper ---- */
  .phase-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 2px;
    margin-bottom: 16px;
    align-items: center;
    font-size: 12px;
  }
  .phase {
    padding: 5px 10px;
    border-radius: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    white-space: nowrap;
    transition: all 0.2s;
  }
  .phase.active {
    border-color: var(--accent);
    color: var(--accent-bright);
    background: var(--accent-dim);
  }
  .phase.done {
    border-color: var(--success);
    color: var(--success);
    background: var(--success-dim);
  }
  .phase-arrow { color: var(--text-dim); font-size: 10px; padding: 0 2px; }

  #gen-hint {
    margin-bottom: 10px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* ---- Done ---- */
  .done-box {
    text-align: center;
    padding: 32px 16px 24px;
  }
  .done-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: var(--success-dim);
    border: 2px solid var(--success);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--success);
  }
  #done-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
  }
  .done-box p { color: var(--text-muted); font-size: 13px; margin-top: 8px; line-height: 1.6; }
  #done-path {
    font-family: Consolas, monospace;
    font-size: 12px;
    color: var(--accent-bright);
    word-break: break-all;
    margin-top: 10px !important;
  }

  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 5px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #error-box {
    display: none;
    background: var(--danger-dim);
    border: 1px solid rgba(199, 92, 92, 0.4);
    border-radius: 8px;
    padding: 11px 14px;
    margin-bottom: 18px;
    font-size: 13px;
    color: #e89898;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">⛏</div>
      <div class="header-text">
        <h1><span>DMCL</span></h1>
        <p class="sub">Developer Minecraft Launcher · 模组开发工作台</p>
      </div>
    </div>
  </div>

  <div class="body">
    <div id="error-box"><span id="error-text"></span></div>

    <!-- Step 1: Loader -->
    <div class="step active" id="step-loader">
      <p class="step-title">
        选择模组加载器
        <span class="hint-inline">不确定就选 Fabric，轻量且更新快</span>
      </p>
      <div class="cards" id="loader-cards"></div>
      <div class="btn-group">
        <button class="btn btn-primary" id="loader-next" disabled>下一步</button>
      </div>
    </div>

    <!-- Step 2: Config -->
    <div class="step" id="step-config">
      <div class="form-group">
        <label>模组名字</label>
        <input id="inp-name" placeholder="我的第一个模组 / My First Mod" value="">
      </div>
      <div class="form-group">
        <label>Minecraft 版本</label>
        <select id="sel-mc"></select>
      </div>
      <div class="form-group">
        <label>项目保存位置</label>
        <div class="form-row">
          <input id="inp-dir" placeholder="加载中…" value="">
          <button class="btn btn-secondary btn-sm" id="btn-browse" type="button">浏览</button>
        </div>
        <div id="dir-preview"></div>
      </div>

      <details class="advanced">
        <summary>高级选项（默认即可）</summary>
        <div class="form-group">
          <label>模组 ID</label>
          <input id="inp-modid" placeholder="mymod" value="" maxlength="64">
        </div>
        <div class="form-group">
          <label>Java 包名</label>
          <input id="inp-group" placeholder="com.example.mymod" value="">
        </div>
        <div class="form-group" id="mappings-group">
          <label>映射表</label>
          <select id="sel-mappings"></select>
        </div>
        <label class="checkbox-row">
          <input type="checkbox" id="chk-mirror" checked> 使用国内镜像加速
        </label>
      </details>

      <div class="btn-group">
        <button class="btn btn-secondary" id="config-back">返回</button>
        <button class="btn btn-primary" id="config-gen">一键创建</button>
      </div>
    </div>

    <!-- Step 3: Generating -->
    <div class="step" id="step-gen">
      <div class="phase-bar">
        <span class="phase" id="phase-gen"><span class="spinner" id="spin-gen"></span>创建项目</span>
        <span class="phase-arrow">›</span>
        <span class="phase" id="phase-build">验证构建</span>
        <span class="phase-arrow">›</span>
        <span class="phase" id="phase-client">启动客户端</span>
        <span class="phase-arrow">›</span>
        <span class="phase" id="phase-done">完成</span>
      </div>
      <p id="gen-hint">正在下载模板并生成项目，大约 10~30 秒…</p>
      <div class="log" id="gen-log"></div>
      <div class="btn-group" style="justify-content:center;">
        <button class="btn btn-secondary" id="gen-cancel">取消</button>
      </div>
    </div>

    <!-- Step 4: Done -->
    <div class="step" id="step-done">
      <div class="done-box">
        <div class="done-icon">✓</div>
        <div id="done-title">项目已创建并通过完整验证</div>
        <p id="done-path"></p>
        <p>构建与客户端均已验证，可直接用 Cursor / IDEA 打开开始写模组。</p>
      </div>
      <div class="btn-group" style="justify-content:center;">
        <button class="btn btn-primary" id="done-open-folder">打开文件夹</button>
        <button class="btn btn-secondary" id="done-close">关闭</button>
      </div>
    </div>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
